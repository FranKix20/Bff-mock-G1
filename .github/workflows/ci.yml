name: CI - BFF Grupo 1

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar pruebas funcionales
        run: npm test

      - name: Verificar que el servidor arranca correctamente
        run: |
          node index.js &
          SERVER_PID=$!
          sleep 2
          curl -f http://localhost:3001/health || (echo "El health check falló" && exit 1)
          kill $SERVER_PID
